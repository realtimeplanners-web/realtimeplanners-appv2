<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

  <div class="bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="dash-wrapper" id="dashWrapper" hidden>
    <header class="dash-header">
      <div class="dash-logo">
        <svg width="30" height="30" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="10" fill="url(#dg)"/>
          <path d="M18 8L28 14V22L18 28L8 22V14L18 8Z" fill="white" fill-opacity="0.9"/>
          <defs>
            <linearGradient id="dg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
        <span>MyApp</span>
      </div>
      <button class="btn-logout" id="logoutBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign out
      </button>
    </header>

    <main class="dash-main">
      <div class="welcome-card">
        <div class="avatar" id="avatar"></div>
        <div>
          <h1 id="welcomeName">Welcome!</h1>
          <p id="welcomeEmail"></p>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon stat-icon-1">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">Account</span>
            <span class="stat-value">Active</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon-2">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">Security</span>
            <span class="stat-value">Verified</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon-3">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">Last login</span>
            <span class="stat-value" id="lastLogin">Just now</span>
          </div>
        </div>
      </div>

      <div class="info-card">
        <h2>You're signed in successfully</h2>
        <p>This is your dashboard. Your login page is fully operational — users can register, sign in with email/password or Google, reset their password, and land here after authentication.</p>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
